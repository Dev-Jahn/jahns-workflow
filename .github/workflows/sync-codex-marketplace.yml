name: Sync Codex marketplace pin

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: sync-codex-marketplace
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release
        uses: actions/checkout@v5

      - name: Read plugin version
        id: meta
        run: echo "version=$(jq -r .version .codex-plugin/plugin.json)" >> "$GITHUB_OUTPUT"

      - name: Configure Codex marketplace deploy key
        env:
          DEPLOY_KEY: ${{ secrets.CODEX_MARKETPLACE_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pin Waystone release SHA
        env:
          NEW_SHA: ${{ github.sha }}
          NEW_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          git clone git@github.com:Dev-Jahn/jahns-codex-marketplace.git marketplace
          cd marketplace
          file=.agents/plugins/marketplace.json
          count=$(jq '[.plugins[] | select(.name == "waystone")] | length' "$file")
          test "$count" -eq 1
          tmp=$(mktemp)
          jq --indent 2 --arg sha "$NEW_SHA" \
            '(.plugins[] | select(.name == "waystone").source.sha) = $sha' \
            "$file" > "$tmp"
          mv "$tmp" "$file"
          if git diff --quiet -- "$file"; then
            echo "Codex marketplace already pins ${NEW_SHA}."
            exit 0
          fi
          git config user.name "waystone-ci"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "$file"
          git commit -qm "chore(waystone): sync v${NEW_VERSION} @ ${NEW_SHA:0:7}"
          git push origin HEAD:main
